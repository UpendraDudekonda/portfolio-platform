spring.application.name=contact-service

server.port=8084

portfolio.owner.email=9upendrad@gmail.com

springdoc.swagger-ui.path=/swagger-ui.html

# MYSQL

spring.datasource.url=jdbc:mysql://localhost:3306/contact_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.jpa.properties.hibernate.format_sql=true



# Eureka

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true



# Actuator

management.endpoints.web.exposure.include=health,info
