spring.application.name=auth-service
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT Configuration
jwt.secret=VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUU2lnbmluZ0FuZEl0TXVzdEJlTG9uZ0Vub3VnaA==
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
# Actuator
management.endpoints.web.exposure.include=*
# LOGGING
# ==========================================
logging.level.org.hibernate.SQL=DEBUG